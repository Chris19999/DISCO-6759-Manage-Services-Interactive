<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=1250, initial-scale=1.0" />
  <title>Manage Services - Web Preview</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
  <style>
    @font-face {
      font-family: 'PlexCircular';
      src: url('plexcircular-bold.woff2') format('woff2');
      font-weight: 700;
      font-style: normal;
    }
    :root {
      --color-bg: #000000;
      --color-surface: #1a1a1a;
      --color-control: rgba(255, 255, 255, 0.1);
      --color-text-primary: #ffffff;
      --color-text-default: rgba(255, 255, 255, 0.8);
      --color-text-muted: rgba(255, 255, 255, 0.5);
      --color-accent: #e5a00d;
      --color-divider: rgba(255, 255, 255, 0.1);
      --color-primary-fg-5: rgba(255, 255, 255, 0.05);
      --color-primary-fg-30: rgba(255, 255, 255, 0.3);
      --color-backdrop: rgba(0, 0, 0, 0.8);
      --font-heading: 'PlexCircular', 'Inter', sans-serif;
      --font-body: 'Inter', sans-serif;
      --radii-s: 4px;
      --radii-m: 8px;
      --radii-l: 16px;
      --radii-max: 9999px;
    }
    * { margin: 0; padding: 0; box-sizing: border-box; }
    html, body {
      width: 1250px;
      height: 1080px;
      overflow: hidden;
      background: var(--color-bg);
      font-family: var(--font-body);
    }

    /* Modal overlay */
    .modal-overlay {
      position: fixed;
      inset: 0;
      display: flex;
      align-items: center;
      justify-content: center;
      z-index: 100;
    }
    .modal-backdrop {
      position: absolute;
      inset: 0;
      background: rgba(0, 0, 0, 0.6);
      backdrop-filter: blur(4px);
      -webkit-backdrop-filter: blur(4px);
    }

    /* Modal frame */
    .modal {
      position: relative;
      width: 560px;
      height: 720px;
      padding: 16px;
      z-index: 1;
    }
    .modal-panel {
      width: 100%;
      height: 100%;
      border-radius: var(--radii-l);
      border: 1px solid rgba(255, 255, 255, 0.1);
      background: var(--color-backdrop);
      backdrop-filter: blur(32px);
      -webkit-backdrop-filter: blur(32px);
      box-shadow: 0px 4px 4px 0px rgba(0, 0, 0, 0.25);
      display: flex;
      flex-direction: column;
      overflow: hidden;
    }

    /* Main view — fills modal panel as flex column */
    #mainView {
      display: flex;
      flex-direction: column;
      flex: 1;
      min-height: 0;
    }

    /* Modal header */
    .modal-header {
      display: flex;
      align-items: flex-start;
      justify-content: space-between;
      padding: 24px 24px 0 24px;
      flex-shrink: 0;
    }
    .modal-title {
      font-family: var(--font-heading);
      font-weight: 700;
      font-size: 21px;
      line-height: 32px;
      color: var(--color-text-primary);
    }
    .close-btn {
      width: 64px;
      height: 64px;
      display: flex;
      align-items: flex-start;
      justify-content: flex-end;
      padding-top: 0;
      background: none;
      border: none;
      cursor: pointer;
      flex-shrink: 0;
    }
    .close-btn svg { opacity: 0.6; }
    .close-btn:hover svg { opacity: 1; }

    /* Scroll container wrapper — holds scroll area + custom scrollbar */
    .scroll-wrapper {
      flex: 1;
      min-height: 0;
      position: relative;
      /* Gradient fade mask — dynamically applied via JS based on scroll position */
    }
    .scroll-container {
      position: absolute;
      inset: 0;
      overflow-y: auto;
      overflow-x: hidden;
      padding: 0 24px 24px;
      scrollbar-width: none;
      -ms-overflow-style: none;
    }
    .scroll-container::-webkit-scrollbar { display: none; }

    /* Custom scrollbar */
    .custom-scrollbar {
      position: absolute;
      top: 0;
      right: 4px;
      bottom: 24px;
      width: 6px;
      background: rgba(0, 0, 0, 0.3);
      border-radius: 6px;
      z-index: 3;
      pointer-events: none;
    }
    .custom-scrollbar-thumb {
      position: absolute;
      top: 0;
      left: 0;
      width: 6px;
      background: #ffffff;
      border-radius: 6px;
      min-height: 20px;
      transition: top 0.05s linear;
    }

    /* Toolbar */
    .toolbar {
      display: flex;
      align-items: center;
      justify-content: space-between;
      height: 64px;
      flex-shrink: 0;
    }
    .search-btn, .icon-btn {
      background: none;
      border: none;
      cursor: pointer;
      padding: 4px;
    }
    .search-btn:hover svg { opacity: 0.8; }

    /* Search bar */
    .search-bar {
      display: none;
      align-items: center;
      background: var(--color-primary-fg-5);
      border: 1px solid rgba(255, 255, 255, 0.18);
      border-radius: var(--radii-m);
      padding: 0 8px;
      height: 32px;
      width: 100%;
    }
    .search-bar-wrapper {
      display: none;
      align-items: center;
      height: 64px;
    }
    .search-bar-wrapper.active { display: flex; }
    .search-bar-wrapper.active .search-bar { display: flex; }
    .search-bar input {
      flex: 1;
      background: none;
      border: none;
      outline: none;
      color: var(--color-text-primary);
      font-size: 14px;
      font-weight: 400;
      line-height: 20px;
      margin-left: 8px;
      font-family: var(--font-body);
    }
    .search-bar input::placeholder { color: var(--color-text-muted); }
    .no-results {
      color: var(--color-text-default);
      font-size: 14px;
      padding: 48px 0;
      text-align: center;
    }

    /* Sort chip */
    .sort-chip {
      display: flex;
      align-items: center;
      gap: 6px;
      padding: 4px 12px;
      background: var(--color-control);
      border-radius: var(--radii-max);
      border: none;
      cursor: pointer;
      color: var(--color-text-primary);
      font-size: 14px;
      font-weight: 600;
      line-height: 20px;
      font-family: var(--font-body);
      position: relative;
    }
    .sort-chip:hover { background: rgba(255, 255, 255, 0.15); }
    .sort-chip .sort-clear {
      display: none;
      background: none;
      border: none;
      cursor: pointer;
      padding: 0;
      margin-left: 2px;
      line-height: 0;
    }
    .sort-chip.active .sort-clear { display: flex; }

    /* Sort dropdown */
    .sort-dropdown {
      position: absolute;
      top: 100%;
      right: 0;
      margin-top: 4px;
      background: rgba(40, 40, 40, 0.95);
      backdrop-filter: blur(16px);
      border: 1px solid rgba(255, 255, 255, 0.1);
      border-radius: var(--radii-m);
      padding: 8px 0;
      min-width: 180px;
      z-index: 20;
      display: none;
      box-shadow: 0 8px 32px rgba(0, 0, 0, 0.4);
    }
    .sort-dropdown.visible { display: block; }
    .sort-option {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 10px 16px;
      cursor: pointer;
      background: none;
      border: none;
      width: 100%;
      font-family: var(--font-body);
    }
    .sort-option:hover { background: rgba(255, 255, 255, 0.05); }
    .sort-option-label { font-size: 14px; color: var(--color-text-primary); }
    .sort-option.selected .sort-option-label { color: var(--color-accent); }

    /* Section headers */
    .section-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 8px 0;
    }
    .section-title-row { display: flex; align-items: center; gap: 8px; }
    .section-title {
      font-weight: 700;
      font-size: 21px;
      line-height: 32px;
      color: var(--color-text-primary);
      font-family: var(--font-heading);
    }
    .badge {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      background: #000;
      border-radius: var(--radii-m);
      padding: 4px 8px;
      font-size: 12px;
      color: #fff;
      font-weight: 600;
      font-family: var(--font-body);
      line-height: 16px;
    }
    .toggle-btn {
      display: flex;
      align-items: center;
      gap: 4px;
      background: none;
      border: none;
      cursor: pointer;
      font-size: 12px;
      font-weight: 600;
      line-height: 16px;
      color: var(--color-text-default);
      font-family: var(--font-body);
    }
    .toggle-btn:hover { color: var(--color-text-primary); }

    /* Service rows */
    .service-item {
      display: flex;
      align-items: center;
      padding: 8px;
      border-radius: var(--radii-m);
      transition: background 0.15s;
    }
    .service-item:hover { background: rgba(255, 255, 255, 0.05); }
    .service-left {
      display: flex;
      align-items: center;
      flex: 1;
      min-width: 0;
      cursor: default;
    }
    .service-left.pressable { cursor: pointer; }
    .service-left.pressable:hover { opacity: 0.85; }
    .service-icon {
      width: 56px;
      height: 56px;
      border-radius: var(--radii-m);
      border: 1px solid var(--color-divider);
      overflow: hidden;
      flex-shrink: 0;
      background: #1a1a1a;
      display: flex;
      align-items: center;
      justify-content: center;
    }
    .service-icon .placeholder {
      font-size: 10px;
      color: var(--color-text-muted);
      text-align: center;
      line-height: 1.2;
      font-weight: 700;
    }
    .service-info { flex: 1; min-width: 0; margin-left: 12px; }
    .service-name {
      font-size: 16px;
      font-weight: 400;
      line-height: 24px;
      color: var(--color-text-default);
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
      font-family: var(--font-body);
    }
    .service-name.selected { color: var(--color-text-primary); }
    .service-subtitle {
      font-size: 12px;
      font-weight: 600;
      color: var(--color-accent);
      line-height: 16px;
    }
    .service-divider {
      width: 1px;
      height: 32px;
      background: var(--color-divider);
      margin: 0 12px;
      flex-shrink: 0;
    }
    .service-spacer { width: 12px; flex-shrink: 0; }

    /* Switch */
    .switch {
      width: 46px;
      height: 24px;
      border-radius: var(--radii-max);
      background: var(--color-control);
      position: relative;
      cursor: pointer;
      flex-shrink: 0;
      transition: background 0.2s cubic-bezier(0.33, 0, 0.67, 1);
      overflow: hidden;
      padding: 2px;
    }
    .switch:hover { background: rgba(255, 255, 255, 0.15); }
    .switch.active { background: var(--color-accent); }
    .switch.active:hover { background: #d4920c; }
    .switch .thumb {
      width: 20px;
      height: 20px;
      border-radius: var(--radii-max);
      background: white;
      transition: transform 0.2s cubic-bezier(0.33, 0, 0.67, 1);
    }
    .switch.active .thumb { transform: translateX(22px); }

    .section-gap { height: 24px; }
    .my-services-list { overflow: hidden; transition: max-height 0.3s ease, opacity 0.3s ease; padding: 0 8px; margin: 0 -8px; }
    .my-services-list.collapsed { max-height: 0; opacity: 0; }
    .my-services-list.expanded { max-height: 800px; opacity: 1; }
    #allServicesList { padding: 0 8px; margin: 0 -8px; }
    #searchResults { padding: 0 8px; margin: 0 -8px; }

    /* Animations */
    @keyframes fadeOut {
      0%   { opacity: 1; }
      100% { opacity: 0.3; }
    }
    @keyframes collapseOut {
      from { max-height: 72px; opacity: 0.3; margin-bottom: 0; }
      to   { max-height: 0; opacity: 0; margin-bottom: -8px; overflow: hidden; }
    }
    .service-item.flashing { animation: fadeOut 1s ease forwards; }
    /* Allow clicking left side during fade to re-select */
    .service-item.collapsing { animation: collapseOut 0.3s ease forwards; overflow: hidden; pointer-events: none; }
    @keyframes fadeInItem {
      from { opacity: 0; }
      to   { opacity: 1; }
    }
    .service-item.entering { animation: fadeInItem 0.3s ease forwards; }

    /* Search results */
    .search-channel-label {
      font-size: 12px;
      font-weight: 600;
      line-height: 16px;
      font-family: var(--font-body);
      color: var(--color-text-primary);
    }
    .search-channel-section { padding-top: 24px; display: flex; flex-direction: column; gap: 16px; }
    .search-parent-group { display: flex; flex-direction: column; }
    .search-parent-group .service-item { opacity: 0.7; }
    .search-parent-group .service-item .switch { opacity: 0.3; pointer-events: none; }
    .sub-channel-row {
      display: flex;
      align-items: center;
      padding: 8px;
      margin-left: 8px;
      border-radius: var(--radii-m);
      cursor: pointer;
      transition: background 0.15s;
    }
    .sub-channel-row:hover { background: rgba(255, 255, 255, 0.05); }
    .sub-channel-row .sub-icon {
      width: 48px;
      height: 48px;
      border-radius: var(--radii-m);
      border: 1px solid var(--color-control);
      overflow: hidden;
      flex-shrink: 0;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 10px;
      font-weight: 700;
      color: white;
    }
    .sub-channel-row .sub-name {
      flex: 1;
      font-size: 16px;
      font-weight: 400;
      line-height: 24px;
      font-family: var(--font-body);
      color: var(--color-text-default);
      padding-left: 12px;
      padding-right: 16px;
    }
    .sub-channel-row .sub-name.selected { color: var(--color-text-primary); }

    /* Checkbox / Radio */
    .checkbox-box, .radio-circle {
      width: 16px;
      height: 16px;
      flex-shrink: 0;
      position: relative;
      overflow: visible;
    }
    .checkbox-box svg, .radio-circle svg {
      position: absolute;
      inset: -8.33%;
      width: 116.67%;
      height: 116.67%;
      display: block;
    }
    .dimmed { opacity: 0.4; pointer-events: none; }

    /* More Options view */
    .more-opts-view {
      display: none;
      flex-direction: column;
      height: 100%;
    }
    .more-opts-view.active { display: flex; }
    .more-opts-header-bar {
      display: flex;
      align-items: center;
      padding: 24px 24px 0 24px;
      gap: 12px;
      flex-shrink: 0;
    }
    .back-btn {
      width: 28px;
      height: 28px;
      border-radius: var(--radii-max);
      background: var(--color-control);
      border: none;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      flex-shrink: 0;
    }
    .back-btn:hover { background: rgba(255, 255, 255, 0.15); }
    .more-opts-title {
      flex: 1;
      font-family: var(--font-heading);
      font-weight: 700;
      font-size: 21px;
      line-height: 32px;
      color: var(--color-text-primary);
    }
    .more-opts-scroll {
      flex: 1;
      overflow-y: auto;
      padding: 0 24px 24px;
      scrollbar-width: none;
    }
    .more-opts-scroll::-webkit-scrollbar { display: none; }
    .more-opts-service-header {
      display: flex;
      align-items: center;
      padding: 24px 0;
      gap: 12px;
    }
    .more-opts-service-header .service-icon { width: 56px; height: 56px; border-radius: 8px; }
    .more-opts-service-header .service-name { flex: 1; font-size: 16px; font-weight: 400; line-height: 24px; color: var(--color-text-primary); font-family: var(--font-body); }
    .more-opts-divider {
      width: 100%;
      height: 1px;
      background: var(--color-control);
      margin-bottom: 16px;
    }
    .tabs {
      display: flex;
      gap: 4px;
      margin-bottom: 12px;
    }
    .tab-btn {
      background: none;
      border: 1.5px solid transparent;
      font-size: 14px;
      font-weight: 600;
      line-height: 20px;
      color: var(--color-text-muted);
      cursor: pointer;
      height: 40px;
      padding: 0 12px;
      border-radius: var(--radii-max);
      transition: all 0.2s;
      font-family: var(--font-body);
      display: flex;
      align-items: center;
    }
    .tab-btn:hover { color: var(--color-text-default); }
    .tab-btn.active {
      border-color: var(--color-primary-fg-30);
      color: var(--color-text-primary);
    }
    .tab-desc {
      font-size: 12px;
      font-weight: 400;
      color: var(--color-text-default);
      margin-bottom: 12px;
      line-height: 16px;
      font-family: var(--font-body);
    }
    .option-row {
      display: flex;
      align-items: center;
      padding: 8px;
      cursor: pointer;
      border-radius: var(--radii-m);
      transition: background 0.15s;
    }
    .option-row:hover { background: rgba(255, 255, 255, 0.05); }
    .option-row .option-icon {
      width: 48px;
      height: 48px;
      border-radius: var(--radii-m);
      border: 1px solid var(--color-control);
      background: #1a1a1a;
      display: flex;
      align-items: center;
      justify-content: center;
      flex-shrink: 0;
      font-size: 10px;
      color: var(--color-text-muted);
      font-weight: 700;
      overflow: hidden;
    }
    .option-row .option-name {
      flex: 1;
      font-size: 16px;
      font-weight: 400;
      line-height: 24px;
      color: var(--color-text-default);
      font-family: var(--font-body);
      padding-left: 12px;
      padding-right: 16px;
    }
    .option-row .option-name.selected { color: var(--color-text-primary); }
    .option-row.plan-row { padding: 8px; }
    .option-row.plan-row .option-name { padding-left: 0; padding-right: 16px; }

    .tab-content.tab-entering { animation: fadeIn 0.2s ease forwards; }
    @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }

    .blank-state-title { padding: 8px 0; }
    .blank-state-heading { margin-bottom: 4px; font-weight: 600; font-size: 14px; color: var(--color-text-default); font-family: var(--font-heading); }
    .blank-state-body { font-size: 12px; color: var(--color-text-muted); line-height: 16px; }

    svg { display: block; }
    .hidden { display: none; }

    /* Placeholder background content */
    .bg-content {
      position: fixed;
      inset: 0;
      z-index: 0;
      background: url('bg.png') center/cover no-repeat;
      background-color: #1a1a1a;
      overflow: hidden;
    }
  </style>
</head>
<body>
  <!-- Placeholder background content -->
  <div class="bg-content"></div>

  <div class="modal-overlay">
    <div class="modal-backdrop"></div>
    <div class="modal">
      <div class="modal-panel">

        <!-- Main view -->
        <div id="mainView">
          <div class="modal-header">
            <div class="modal-title">Manage Services</div>
            <button class="close-btn" onclick="alert('Close modal')">
              <svg width="16" height="16" viewBox="0 0 24 24" fill="none"><path d="M18 6L6 18M6 6l12 12" stroke="rgba(255,255,255,0.6)" stroke-width="2" stroke-linecap="round"/></svg>
            </button>
          </div>

          <div class="scroll-wrapper">
          <div class="scroll-container" id="scrollContainer">
            <!-- Search bar (hidden by default) -->
            <div class="search-bar-wrapper" id="searchBarWrapper">
              <div class="search-bar" id="searchBar">
                <svg width="16" height="16" viewBox="0 0 24 24" fill="none"><circle cx="11" cy="11" r="7" stroke="rgba(255,255,255,0.5)" stroke-width="2"/><path d="M16 16l4 4" stroke="rgba(255,255,255,0.5)" stroke-width="2" stroke-linecap="round"/></svg>
                <input id="searchInput" type="text" placeholder="Search services & channels..." oninput="debouncedSearch(this.value)" />
                <button class="icon-btn" onclick="clearSearch()">
                  <svg width="16" height="16" viewBox="0 0 24 24" fill="none"><path d="M18 6L6 18M6 6l12 12" stroke="rgba(255,255,255,0.5)" stroke-width="1.5" stroke-linecap="round"/></svg>
                </button>
              </div>
            </div>

            <!-- Toolbar -->
            <div class="toolbar" id="toolbar">
              <button class="search-btn" onclick="event.stopPropagation(); activateSearch()">
                <svg width="24" height="24" viewBox="0 0 24 24" fill="none"><circle cx="11" cy="11" r="7" stroke="white" stroke-width="2"/><path d="M16 16l4 4" stroke="white" stroke-width="2" stroke-linecap="round"/></svg>
              </button>
              <div style="position:relative">
                <button class="sort-chip" id="sortChip" onclick="toggleSortDropdown(event)">
                  <svg width="16" height="16" viewBox="0 0 16 16" fill="none"><path d="M2 4h12M4 8h8M6 12h4" stroke="currentColor" stroke-width="1.5" stroke-linecap="round"/></svg>
                  <span id="sortLabel">Popularity</span>
                  <span class="sort-clear" id="sortClear" onclick="event.stopPropagation(); resetSort();">
                    <svg width="14" height="14" viewBox="0 0 24 24" fill="none"><path d="M18 6L6 18M6 6l12 12" stroke="currentColor" stroke-width="2" stroke-linecap="round"/></svg>
                  </span>
                </button>
                <div class="sort-dropdown" id="sortDropdown">
                  <button class="sort-option selected" data-sort="popularity" onclick="selectSort('popularity')">
                    <span class="sort-option-label">Popularity</span>
                    <svg width="16" height="16" viewBox="0 0 24 24" fill="none" class="check-icon"><path d="M5 13l4 4L19 7" stroke="#e5a00d" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/></svg>
                  </button>
                  <button class="sort-option" data-sort="alphabetical" onclick="selectSort('alphabetical')">
                    <span class="sort-option-label">Alphabetical</span>
                    <svg width="16" height="16" viewBox="0 0 24 24" fill="none" class="check-icon" style="display:none"><path d="M5 13l4 4L19 7" stroke="#e5a00d" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/></svg>
                  </button>
                  <button class="sort-option" data-sort="free" onclick="selectSort('free')">
                    <span class="sort-option-label">Free</span>
                    <svg width="16" height="16" viewBox="0 0 24 24" fill="none" class="check-icon" style="display:none"><path d="M5 13l4 4L19 7" stroke="#e5a00d" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/></svg>
                  </button>
                </div>
              </div>
            </div>

            <!-- Search results container -->
            <div id="searchResults" class="hidden"></div>

            <!-- Normal content -->
            <div id="normalContent">
              <div id="myServicesSection">
                <div id="myServicesPopulated">
                  <div class="section-header">
                    <div class="section-title-row">
                      <span class="section-title">My Services</span>
                      <span class="badge" id="myCount">0</span>
                    </div>
                    <button class="toggle-btn" id="toggleBtn" onclick="toggleMyServices()">
                      <span id="toggleLabel">Hide</span>
                      <svg id="toggleChevron" width="16" height="16" viewBox="0 0 16 16" fill="none" style="transition: transform 0.2s"><path d="M4 10l4-4 4 4" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/></svg>
                    </button>
                  </div>
                  <div class="my-services-list expanded" id="myServicesList"></div>
                </div>
                <div id="myServicesBlank" class="hidden">
                  <div class="blank-state-title">
                    <span class="section-title">My Services</span>
                  </div>
                  <div class="blank-state-heading">It's a little empty here...</div>
                  <div class="blank-state-body">Select the services that you use and get recommended movies &amp; shows that are available to you!</div>
                </div>
                <div class="section-gap"></div>
              </div>
              <div class="section-header" id="allServicesSection">
                <div class="section-title-row"><span class="section-title">All Services</span></div>
              </div>
              <div id="allServicesList"></div>
            </div>
          </div>
          <div class="custom-scrollbar" id="customScrollbar">
            <div class="custom-scrollbar-thumb" id="customScrollbarThumb"></div>
          </div>
          </div>
        </div>

        <!-- More Options view (replaces main content) -->
        <div class="more-opts-view" id="moreOptsView">
          <div class="more-opts-header-bar">
            <button class="back-btn" onclick="closeMoreOptions()">
              <svg width="16" height="16" viewBox="0 0 24 24" fill="none"><path d="M19 12H5M5 12l6-6M5 12l6 6" stroke="white" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/></svg>
            </button>
            <div class="more-opts-title">Select Plan & Add Ons</div>
            <button class="close-btn" onclick="alert('Close modal')" style="width:auto;height:auto;padding:4px">
              <svg width="16" height="16" viewBox="0 0 24 24" fill="none"><path d="M18 6L6 18M6 6l12 12" stroke="rgba(255,255,255,0.6)" stroke-width="2" stroke-linecap="round"/></svg>
            </button>
          </div>
          <div class="more-opts-scroll" id="moreOptsScroll">
            <div id="moreOptsContent"></div>
          </div>
        </div>

      </div>
    </div>
  </div>

  <script>
    const services = [
      { id: 'netflix', name: 'Netflix', color: '#E50914', label: 'NETFLIX', enabled: false, optionsCount: 12,
        channels: [
          { id:'ch1', name:'Channel 1', selected: false },
          { id:'ch2', name:'Channel 2', selected: false },
          { id:'ch3', name:'Channel 3', selected: false },
          { id:'ch4', name:'Channel 3', selected: false },
        ],
        plans: [
          { id:'basic', name:'Basic Plan', selected: false },
          { id:'standard', name:'Standard Plan', selected: false },
          { id:'premium', name:'Premium Plan', selected: false },
        ]
      },
      { id: 'apple-tv', name: 'Apple TV', color: '#000', label: 'tv', enabled: false,
        channels: [
          { id:'atv-acorn-tv', name:'Acorn TV', selected: false },
          { id:'atv-britbox', name:'BritBox', selected: false },
          { id:'atv-paramount-ch', name:'Paramount+', selected: false },
        ]
      },
      { id: 'prime-video', name: 'Prime Video', color: '#00A8E1', label: 'prime', enabled: false, optionsCount: 5,
        channels: [
          { id:'pv-mgm', name:'MGM+', selected: false },
          { id:'pv-starz', name:'Starz', selected: false },
          { id:'pv-acorn-tv', name:'Acorn TV', selected: false },
          { id:'pv-britbox', name:'BritBox', selected: false },
        ],
        plans: [{ id:'prime', name:'Prime', selected: false }, { id:'prime-ad', name:'Prime with Ads', selected: false }]
      },
      { id: 'hulu', name: 'Hulu', color: '#1CE783', label: 'hulu', enabled: false },
      { id: 'paramount', name: 'Paramount+', color: '#0064FF', label: 'P+', enabled: false },
      { id: 'peacock', name: 'Peacock', color: '#000', label: 'peacock', enabled: false },
      { id: 'max', name: 'Max', color: '#002BE7', label: 'MAX', enabled: false },
      { id: 'disney', name: 'Disney+', color: '#113CCF', label: 'D+', enabled: false },
    ];

    const state = {
      currentSort: 'popularity',
      myExpanded: true,
      searchMode: false,
      moreOptionsId: null,
      moreActiveTab: 0,
      skipSearchDismiss: false,
      justActivatedSearch: false,
      svgIdCounter: 0,
      searchAutoEnabled: new Set(),
    };

    const pendingRemovals = new Map();

    let searchTimeout = null;
    function debouncedSearch(value) {
      clearTimeout(searchTimeout);
      searchTimeout = setTimeout(() => handleSearch(value), 150);
    }

    // SVG helpers
    function checkboxSVG(checked) {
      const id = 'cb' + (state.svgIdCounter++);
      const checkFill = checked ? '#E5A00D' : 'white';
      const checkOpacity = checked ? '1' : '0.1';
      const checkFillOpacity = checked ? '1' : '0.8';
      return `<div class="checkbox-box"><svg viewBox="0 0 28 28" fill="none" xmlns="http://www.w3.org/2000/svg" overflow="visible">
        <mask id="${id}" maskUnits="userSpaceOnUse" x="0" y="0" width="28" height="28" fill="black">
          <rect fill="white" width="28" height="28"/>
          <path d="M2 6C2 3.79086 3.79086 2 6 2H22C24.2091 2 26 3.79086 26 6V22C26 24.2091 24.2091 26 22 26H6C3.79086 26 2 24.2091 2 22V6Z"/>
        </mask>
        <path d="M2 6C2 3.79086 3.79086 2 6 2H22C24.2091 2 26 3.79086 26 6V22C26 24.2091 24.2091 26 22 26H6C3.79086 26 2 24.2091 2 22V6Z" fill="white" fill-opacity="0.05"/>
        <path d="M6 2V4H22V2V0H6V2ZM26 6H24V22H26H28V6H26ZM22 26V24H6V26V28H22V26ZM2 22H4V6H2H0V22H2ZM6 26V24C4.89543 24 4 23.1046 4 22H2H0C0 25.3137 2.68629 28 6 28V26ZM26 22H24C24 23.1046 23.1046 24 22 24V26V28C25.3137 28 28 25.3137 28 22H26ZM22 2V4C23.1046 4 24 4.89543 24 6H26H28C28 2.68629 25.3137 0 22 0V2ZM6 2V0C2.68629 0 0 2.68629 0 6H2H4C4 4.89543 4.89543 4 6 4V2Z" fill="white" fill-opacity="0.3" mask="url(#${id})"/>
        <path opacity="${checkOpacity}" fill-rule="evenodd" clip-rule="evenodd" d="M6 14.2176L11.8584 20L22 9.99327L19.9801 8L11.8584 16.0156L8.01767 12.2266L6 14.2176Z" fill="${checkFill}" fill-opacity="${checkFillOpacity}"/>
      </svg></div>`;
    }

    function radioSVG(checked) {
      const id = 'rb' + (state.svgIdCounter++);
      const dotFill = checked ? '#E5A00D' : 'white';
      const dotOpacity = checked ? '1' : '0.1';
      const dotFillOpacity = checked ? '1' : '0.8';
      return `<div class="radio-circle"><svg viewBox="0 0 28 28" fill="none" xmlns="http://www.w3.org/2000/svg" overflow="visible">
        <mask id="${id}" maskUnits="userSpaceOnUse" x="0" y="0" width="28" height="28" fill="black">
          <rect fill="white" width="28" height="28"/>
          <path d="M2 14C2 7.37258 7.37258 2 14 2V2C20.6274 2 26 7.37258 26 14V14C26 20.6274 20.6274 26 14 26V26C7.37258 26 2 20.6274 2 14V14Z"/>
        </mask>
        <path d="M2 14C2 7.37258 7.37258 2 14 2V2C20.6274 2 26 7.37258 26 14V14C26 20.6274 20.6274 26 14 26V26C7.37258 26 2 20.6274 2 14V14Z" fill="white" fill-opacity="0.05"/>
        <path d="M14 26V24C8.47715 24 4 19.5228 4 14H2H0C0 21.732 6.26801 28 14 28V26ZM26 14H24C24 19.5228 19.5228 24 14 24V26V28C21.732 28 28 21.732 28 14H26ZM14 2V4C19.5228 4 24 8.47715 24 14H26H28C28 6.26801 21.732 0 14 0V2ZM14 2V0C6.26801 0 0 6.26801 0 14H2H4C4 8.47715 8.47715 4 14 4V2Z" fill="white" fill-opacity="0.3" mask="url(#${id})"/>
        <circle opacity="${dotOpacity}" cx="14" cy="14" r="6" fill="${dotFill}" fill-opacity="${dotFillOpacity}"/>
      </svg></div>`;
    }

    function createServiceItem(service, { dimmed = false, hideSubtitle = false } = {}) {
      const hasOptions = (service.optionsCount || 0) > 0;
      const showSubtitle = service.enabled && hasOptions && !hideSubtitle;
      const leftOpensMore = !dimmed && service.enabled && hasOptions;
      const leftToggles = !dimmed && !leftOpensMore;
      const leftPressable = leftOpensMore || leftToggles;
      const leftAction = leftOpensMore
        ? `onclick="openMoreOptions('${service.id}')"`
        : leftToggles
        ? `onclick="toggleService('${service.id}')"`
        : '';
      const showDivider = !dimmed && service.enabled && hasOptions;
      const dimmedClass = dimmed ? ' search-parent-service' : '';
      return `
        <div class="service-item${dimmedClass}" data-service-id="${service.id}">
          <div class="service-left ${leftPressable ? 'pressable' : ''}" ${leftAction}>
            <div class="service-icon" style="background: ${service.color}">
              <span class="placeholder">${service.label}</span>
            </div>
            <div class="service-info">
              <div class="service-name${service.enabled ? ' selected' : ''}">${service.name}</div>
              ${showSubtitle && !dimmed ? `<div class="service-subtitle">${(service.channels ? service.channels.filter(c => c.selected).length : 0)} add-ons enabled</div>` : ''}
            </div>
          </div>
          ${showDivider ? '<div class="service-divider"></div>' : '<div class="service-spacer"></div>'}
          <div class="switch ${service.enabled ? 'active' : ''}" ${!dimmed ? `onclick="toggleService('${service.id}')"` : ''}>
            <div class="thumb"></div>
          </div>
        </div>`;
    }

    function getAllServicesHeaderTop() {
      const el = document.getElementById('allServicesSection');
      return el ? el.getBoundingClientRect().top : null;
    }

    function render(anchorId) {
      const contentEl = document.getElementById('scrollContainer');
      const headerTopBefore = getAllServicesHeaderTop();

      const myServices = services.filter(s => s.enabled || pendingRemovals.has(s.id));
      const allServices = state.currentSort === 'alphabetical'
        ? [...services].sort((a, b) => a.name.localeCompare(b.name))
        : [...services];

      const myPopulated = document.getElementById('myServicesPopulated');
      const myBlank = document.getElementById('myServicesBlank');
      if (myServices.length === 0) {
        myPopulated.style.display = 'none';
        myBlank.classList.remove('hidden');
      } else {
        myPopulated.style.display = '';
        myBlank.classList.add('hidden');
        document.getElementById('myServicesList').innerHTML = myServices.map(s => createServiceItem(s)).join('');
        // Re-apply flashing class to any services mid-fade (pendingRemovals)
        pendingRemovals.forEach((timeout, sid) => {
          const el = document.getElementById('myServicesList').querySelector(`[data-service-id="${sid}"]`);
          if (el) el.classList.add('flashing');
        });
        document.getElementById('myCount').textContent = services.filter(s => s.enabled).length;
      }

      document.getElementById('allServicesList').innerHTML = allServices.map(s => createServiceItem(s)).join('');

      void contentEl.offsetHeight;

      // When My Services just became empty (no enabled services), scroll to top to show blank state
      const anyEnabled = services.some(s => s.enabled);
      if (!anyEnabled && myServices.length === 0 && contentEl.scrollTop > 0) {
        contentEl.scrollTop = 0;
      } else if (headerTopBefore !== null) {
        const headerTopAfter = getAllServicesHeaderTop();
        if (headerTopAfter !== null) {
          const drift = headerTopAfter - headerTopBefore;
          if (Math.abs(drift) > 0.5) {
            contentEl.scrollTop += drift;
          }
        }
      }

      requestAnimationFrame(() => {
        if (typeof updateCustomScrollbar === 'function') updateCustomScrollbar();
        const scrollEl = document.getElementById('scrollContainer');
        const maskEl = scrollEl ? scrollEl.closest('.scroll-wrapper') : null;
        updateScrollMask(scrollEl, maskEl, 32);
      });
    }

    // Toggle service
    function toggleService(id) {
      const s = services.find(s => s.id === id);
      if (!s) return;
      const wasEnabled = s.enabled;
      s.enabled = !s.enabled;

      if (wasEnabled) {
        if (pendingRemovals.has(id)) {
          clearTimeout(pendingRemovals.get(id));
          pendingRemovals.delete(id);
        }
        pendingRemovals.set(id, null);
        render(id);
        renderMoreOpts();

        const myList = document.getElementById('myServicesList');
        const myItem = myList ? myList.querySelector(`[data-service-id="${id}"]`) : null;
        if (myItem) myItem.classList.add('flashing');

        const timeout = setTimeout(() => {
          pendingRemovals.delete(id);
          render(id);
        }, 1000);
        pendingRemovals.set(id, timeout);
      } else {
        if (pendingRemovals.has(id)) {
          clearTimeout(pendingRemovals.get(id));
          pendingRemovals.delete(id);
        }
        render(id);
        renderMoreOpts();

        const myList = document.getElementById('myServicesList');
        const myItem = myList ? myList.querySelector(`[data-service-id="${id}"]`) : null;
        if (myItem) {
          myItem.classList.add('entering');
          myItem.addEventListener('animationend', () => myItem.classList.remove('entering'), { once: true });
        }
      }

      if (state.searchMode) {
        state.skipSearchDismiss = true;
        const searchInput = document.querySelector('#searchBarWrapper input');
        if (searchInput && searchInput.value.trim()) handleSearch(searchInput.value);
        if (searchInput) searchInput.focus();
        setTimeout(() => { state.skipSearchDismiss = false; }, 0);
      }
    }

    function toggleMyServices() {
      state.myExpanded = !state.myExpanded;
      const list = document.getElementById('myServicesList');
      const label = document.getElementById('toggleLabel');
      const chevron = document.getElementById('toggleChevron');
      if (state.myExpanded) {
        list.classList.remove('collapsed'); list.classList.add('expanded');
        label.textContent = 'Hide'; chevron.style.transform = 'rotate(0deg)';
      } else {
        list.classList.remove('expanded'); list.classList.add('collapsed');
        label.textContent = 'Show'; chevron.style.transform = 'rotate(180deg)';
      }
    }

    // Search
    function activateSearch() {
      state.searchMode = true;
      state.justActivatedSearch = true;
      document.getElementById('toolbar').style.display = 'none';
      document.getElementById('searchBarWrapper').classList.add('active');
      setTimeout(() => {
        document.getElementById('searchInput').focus();
        state.justActivatedSearch = false;
      }, 50);
    }

    function dismissSearch() {
      state.searchMode = false;
      state.searchAutoEnabled.clear();
      document.getElementById('toolbar').style.display = '';
      document.getElementById('searchBarWrapper').classList.remove('active');
      document.getElementById('searchResults').classList.add('hidden');
      document.getElementById('normalContent').style.display = '';
      document.getElementById('searchInput').value = '';
    }

    function clearSearch() {
      const input = document.getElementById('searchInput');
      if (input.value) {
        input.value = '';
        handleSearch('');
        input.focus();
      } else {
        dismissSearch();
      }
    }

    function handleSearch(query) {
      const q = query.toLowerCase().trim();
      if (!q) {
        document.getElementById('searchResults').classList.add('hidden');
        document.getElementById('normalContent').style.display = '';
        return;
      }
      document.getElementById('normalContent').style.display = 'none';
      document.getElementById('searchResults').classList.remove('hidden');

      let html = '';
      const matchedServices = services.filter(s => s.name.toLowerCase().includes(q));
      const channelMatches = [];
      services.forEach(s => {
        if (s.channels) {
          s.channels.forEach(ch => {
            if (ch.name.toLowerCase().includes(q)) {
              channelMatches.push({ channel: ch, parentService: s });
            }
          });
        }
      });

      const uniqueChannelNames = [...new Set(channelMatches.map(m => m.channel.name.toLowerCase()))];

      matchedServices.forEach(s => { html += createServiceItem(s); });

      // Group channel results: each parent service + its matching sub-channel
      if (channelMatches.length > 0) {
        html += `<div class="search-channel-section">`;
        html += `<div class="search-channel-label">Channel available through:</div>`;
        const parentGroups = new Map();
        channelMatches.forEach(({ channel, parentService }) => {
          if (!parentGroups.has(parentService.id)) {
            parentGroups.set(parentService.id, { parentService, channels: [] });
          }
          parentGroups.get(parentService.id).channels.push(channel);
        });
        parentGroups.forEach(({ parentService, channels }) => {
          html += `<div class="search-parent-group">`;
          html += createServiceItem(parentService, { hideSubtitle: true });
          channels.forEach(channel => {
            html += `
              <div class="sub-channel-row" onclick="toggleSearchChannel('${parentService.id}', '${channel.id}')">
                <div class="sub-icon" style="background: #333;"><span>${channel.name.substring(0, 6)}</span></div>
                <div class="sub-name${channel.selected ? ' selected' : ''}">${channel.name}</div>
                ${checkboxSVG(channel.selected)}
              </div>`;
          });
          html += `</div>`;
        });
        html += `</div>`;
      }
      if (!html) html = `<div class="no-results">No results found for "${query}"</div>`;

      document.getElementById('searchResults').innerHTML = html;
    }

    function toggleSearchChannel(serviceId, channelId) {
      state.skipSearchDismiss = true;
      const s = services.find(s => s.id === serviceId);
      if (s && s.channels) {
        const ch = s.channels.find(c => c.id === channelId);
        if (ch) {
          ch.selected = !ch.selected;
          if (ch.selected && !s.enabled) {
            s.enabled = true;
            state.searchAutoEnabled.add(s.id);
            render();
          } else if (!ch.selected && state.searchAutoEnabled.has(s.id)) {
            const anySelected = s.channels.some(c => c.selected);
            if (!anySelected) {
              s.enabled = false;
              state.searchAutoEnabled.delete(s.id);
              render();
            }
          }
        }
        handleSearch(document.getElementById('searchInput').value);
      }
      setTimeout(() => { state.skipSearchDismiss = false; }, 0);
    }

    // Sort
    function toggleSortDropdown(e) {
      e.stopPropagation();
      const dd = document.getElementById('sortDropdown');
      dd.classList.toggle('visible');
    }

    function selectSort(option) {
      state.currentSort = option;
      const label = option === 'popularity' ? 'Popularity' : option === 'alphabetical' ? 'Alphabetical' : 'Free';
      document.getElementById('sortLabel').textContent = label;
      const chip = document.getElementById('sortChip');
      chip.classList.toggle('active', option !== 'popularity');
      document.querySelectorAll('.sort-option').forEach(el => {
        const sel = el.dataset.sort === option;
        el.classList.toggle('selected', sel);
        el.querySelector('.check-icon').style.display = sel ? 'block' : 'none';
      });
      document.getElementById('sortDropdown').classList.remove('visible');
      render();
    }

    function resetSort() { selectSort('popularity'); }

    // Close sort dropdown on outside click
    document.addEventListener('click', function(e) {
      const dd = document.getElementById('sortDropdown');
      if (dd.classList.contains('visible') && !e.target.closest('.sort-chip') && !e.target.closest('.sort-dropdown')) {
        dd.classList.remove('visible');
      }
    });

    // More Options
    function openMoreOptions(id) {
      state.moreOptionsId = id;
      state.moreActiveTab = 0;
      document.getElementById('mainView').style.display = 'none';
      document.getElementById('moreOptsView').classList.add('active');
      renderMoreOpts();
    }

    function closeMoreOptions() {
      state.moreOptionsId = null;
      document.getElementById('moreOptsView').classList.remove('active');
      document.getElementById('mainView').style.display = '';
      render();
    }

    function switchMoreTab(tab) {
      state.moreActiveTab = tab;
      renderMoreOpts();
      const tc = document.querySelector('.tab-content');
      if (tc) {
        tc.classList.add('tab-entering');
        tc.addEventListener('animationend', () => tc.classList.remove('tab-entering'), { once: true });
      }
    }

    function toggleChannel(serviceId, channelId) {
      const s = services.find(s => s.id === serviceId);
      if (s && s.channels) {
        const ch = s.channels.find(c => c.id === channelId);
        if (ch) ch.selected = !ch.selected;
        renderMoreOpts();
      }
    }

    function selectPlan(serviceId, planId) {
      const s = services.find(s => s.id === serviceId);
      if (s && s.plans) {
        s.plans.forEach(p => p.selected = p.id === planId);
        renderMoreOpts();
      }
    }

    function renderMoreOpts() {
      if (!state.moreOptionsId) return;
      const s = services.find(sv => sv.id === state.moreOptionsId);
      if (!s) return;
      const hasChannels = s.channels && s.channels.length > 0;
      const hasPlans = s.plans && s.plans.length > 0;
      const hasBoth = hasChannels && hasPlans;

      let html = `
        <div class="more-opts-service-header">
          <div class="service-icon" style="background: ${s.color}"><span class="placeholder">${s.label}</span></div>
          <div class="service-name" style="flex:1;color:white">${s.name}</div>
        </div>
        <div class="more-opts-divider"></div>`;

      if (hasBoth) {
        html += `<div class="tabs">
          <button class="tab-btn ${state.moreActiveTab === 0 ? 'active' : ''}" onclick="switchMoreTab(0)">Channels & Add Ons</button>
          <button class="tab-btn ${state.moreActiveTab === 1 ? 'active' : ''}" onclick="switchMoreTab(1)">Plans</button>
        </div>`;
      }

      html += `<div class="tab-content ${s.enabled ? '' : 'dimmed'}">`;

      if ((state.moreActiveTab === 0 && hasChannels) || (!hasPlans && hasChannels)) {
        html += `<div class="tab-desc">Select any channels or add-ons you have through ${s.name} to prioritize content with availabilities your channels & add-ons.</div>`;
        s.channels.forEach(ch => {
          html += `<div class="option-row" onclick="toggleChannel('${s.id}','${ch.id}')">
            <div class="option-icon">${ch.name.substring(0,3)}</div>
            <div class="option-name${ch.selected ? ' selected' : ''}">${ch.name}</div>
            ${checkboxSVG(ch.selected)}
          </div>`;
        });
      }

      if ((state.moreActiveTab === 1 && hasPlans) || (!hasChannels && hasPlans)) {
        html += `<div class="tab-desc">Different plans may have different movies and shows available in their catalogs.</div>`;
        s.plans.forEach(p => {
          html += `<div class="option-row plan-row" onclick="selectPlan('${s.id}','${p.id}')">
            <div class="option-name${p.selected ? ' selected' : ''}">${p.name}</div>
            ${radioSVG(p.selected)}
          </div>`;
        });
      }

      html += '</div>';
      document.getElementById('moreOptsContent').innerHTML = html;
    }

    // Custom scrollbar
    function updateCustomScrollbar() {
      const scrollArea = document.getElementById('scrollContainer');
      const scrollbar = document.getElementById('customScrollbar');
      const thumb = document.getElementById('customScrollbarThumb');
      if (!scrollArea || !scrollbar || !thumb) return;
      const scrollHeight = scrollArea.scrollHeight;
      const clientHeight = scrollArea.clientHeight;
      if (scrollHeight <= clientHeight) {
        scrollbar.style.display = 'none';
        return;
      }
      scrollbar.style.display = '';
      const trackHeight = scrollbar.clientHeight;
      const thumbHeight = Math.max(20, (clientHeight / scrollHeight) * trackHeight);
      const scrollableRange = scrollHeight - clientHeight;
      const thumbRange = trackHeight - thumbHeight;
      const scrollRatio = scrollArea.scrollTop / scrollableRange;
      const thumbTop = scrollRatio * thumbRange;
      thumb.style.height = thumbHeight + 'px';
      thumb.style.top = thumbTop + 'px';
    }
    // Dynamic gradient fade mask based on scroll position
    function updateScrollMask(scrollEl, maskEl, fadeDistance) {
      if (!scrollEl || !maskEl) return;
      const top = scrollEl.scrollTop;
      const atTop = top === 0;
      const atBottom = top + scrollEl.clientHeight >= scrollEl.scrollHeight - 1;
      const noOverflow = scrollEl.scrollHeight <= scrollEl.clientHeight;
      let mask;
      if (noOverflow || (atTop && atBottom)) {
        mask = 'none';
      } else if (atTop) {
        mask = `linear-gradient(to bottom, black, black calc(100% - ${fadeDistance}px), transparent)`;
      } else if (atBottom) {
        mask = `linear-gradient(to bottom, transparent, black ${fadeDistance}px, black)`;
      } else {
        mask = `linear-gradient(to bottom, transparent, black ${fadeDistance}px, black calc(100% - ${fadeDistance}px), transparent)`;
      }
      maskEl.style.maskImage = mask;
      maskEl.style.webkitMaskImage = mask;
    }

    document.getElementById('scrollContainer').addEventListener('scroll', function() {
      updateCustomScrollbar();
      const scrollEl = document.getElementById('scrollContainer');
      const maskEl = scrollEl.closest('.scroll-wrapper');
      updateScrollMask(scrollEl, maskEl, 32);
    });

    // Dismiss search when clicking outside the search bar and search results
    document.querySelector('.modal-panel').addEventListener('mousedown', function(e) {
      if (!state.searchMode || state.justActivatedSearch || state.skipSearchDismiss) return;
      // Don't dismiss if clicking inside search bar
      if (e.target.closest('#searchBarWrapper')) return;
      // Don't dismiss if clicking on interactive elements in search results
      if (e.target.closest('.switch') || e.target.closest('.sub-channel-row') || e.target.closest('.service-item')) return;
      // Don't dismiss if clicking the × clear button inside search bar
      if (e.target.closest('.icon-btn')) return;
      dismissSearch();
    });

    render();
  </script>
</body>
</html>
